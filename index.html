<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学业管理</title>
    <link rel="stylesheet" href="style.css?v=3.2">
</head>
<body>

<!-- ==================== 顶部导航 ==================== -->
<header class="header">
    <nav class="nav container">
        <a href="#" class="nav__logo" data-tab="todos">📋 TaskFlow</a>
        <div class="nav__tabs">
            <button class="nav__tab active" data-tab="todos">✅ 待办</button>
            <button class="nav__tab" data-tab="calendar">📅 日历</button>
            <button class="nav__tab" data-tab="subjects">📚 科目</button>
            <button class="nav__tab" data-tab="chat">💬 问答</button>
        </div>
        <ul class="nav__list">
            <li><button class="btn btn--outline btn--sm" id="importBtn">📤 导入</button></li>
            <li><span id="nav-username" class="nav__username" style="display:none;"></span></li>
            <li><a href="#" id="nav-logout" class="nav__link nav__link--logout" style="display:none;">退出</a></li>
        </ul>
    </nav>
</header>
<input type="file" id="importFile" accept=".txt,.csv,.md,.docx" style="display:none;">

<!-- ==================== 主内容区 ==================== -->
<main class="main container">

    <!-- ===== 待办视图 ===== -->
    <section class="view active" id="view-todos">
        <div class="view__header">
            <div class="view__header-left">
                <h2>✅ 待办清单</h2>
                <div class="date-picker">
                    <button class="btn btn--icon" id="todoPrevDay">◀</button>
                    <input type="date" id="todoDate" class="date-input">
                    <button class="btn btn--icon" id="todoNextDay">▶</button>
                    <button class="btn btn--icon" id="todoToday">今天</button>
                </div>
            </div>
            <button class="btn btn--primary btn--sm" id="addTodoBtn">+ 添加任务</button>
        </div>
        <!-- 当天事件提示 -->
        <div class="day-events" id="dayEvents"></div>
        <!-- 任务列表 -->
        <div class="todo-list" id="todoList">
            <p class="empty-text">暂无任务</p>
        </div>
    </section>

    <!-- ===== 日历视图 ===== -->
    <section class="view" id="view-calendar">
        <div class="view__header">
            <h2>📅 日历</h2>
            <div class="cal__nav">
                <button class="btn btn--icon" id="calPrev">◀</button>
                <span class="cal__month-label" id="calMonthLabel"></span>
                <button class="btn btn--icon" id="calNext">▶</button>
            </div>
        </div>
        <div class="cal__weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
        <div class="cal__grid" id="calGrid"></div>
        <!-- 点击日期弹窗 -->
        <div class="day-card" id="dayCard" style="display:none;">
            <div class="day-card__header">
                <span class="day-card__date" id="dayCardDate"></span>
                <button class="day-card__close" id="dayCardClose">&times;</button>
            </div>
            <div class="day-card__events" id="dayCardEvents"></div>
            <div class="day-card__actions">
                <button class="btn btn--primary btn--sm" id="dayCardAddEvent">+ 添加事件</button>
                <button class="btn btn--outline btn--sm" id="dayCardAddTodo">+ 添加待办</button>
            </div>
        </div>
    </section>

    <!-- ===== 科目视图 ===== -->
    <section class="view" id="view-subjects">
        <div class="view__header">
            <h2>📚 科目管理</h2>
            <button class="btn btn--primary btn--sm" id="addSubjectBtn">+ 添加科目</button>
        </div>
        <div class="subject-grid" id="subjectGrid">
            <p class="empty-text">暂无科目，点击上方按钮添加</p>
        </div>
    </section>

    <!-- ===== 问答视图 ===== -->
    <section class="view" id="view-chat">
        <div class="view__header">
            <h2>💬 小马</h2>
            <div style="display:flex;gap:6px;align-items:center">
                <div style="display:flex;gap:2px;background:#f1f5f9;border-radius:8px;padding:3px" id="modeGroup">
                    <button class="chat-mode-btn active" data-mode="chat">💬 聊天</button>
                    <button class="chat-mode-btn" data-mode="qa">📚 问答</button>
                    <button class="chat-mode-btn" data-mode="modify">✏️ 修改</button>
                </div>
                <button class="btn btn--outline btn--sm" id="chatClearBtn">🗑️ 清空对话</button>
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." maxlength="500">
                <button class="btn btn--primary" id="chatSendBtn">发送</button>
            </div>
        </div>
    </section>
</main>

<!-- ==================== 科目详情模态框 ==================== -->
<div class="modal-overlay" id="subjectDetailModal" style="display:none;">
    <div class="modal modal--lg">
        <div class="modal__header">
            <h3 class="modal__title" id="subjectDetailTitle"></h3>
            <button class="modal__close" data-close="subjectDetailModal">&times;</button>
        </div>
        <div class="modal__body">
            <div class="form-row">
                <div class="form-group"><label>学分</label><span id="sdCredits"></span></div>
                <div class="form-group"><label>目标绩点</label><span id="sdGPA"></span></div>
            </div>
            <div class="form-group"><label>绩点分配</label></div>
            <div class="component-list" id="componentList"></div>
            <button class="btn btn--outline btn--sm" id="addComponentBtn">+ 添加分配项</button>
            <div class="total-bar" id="totalBar">合计：0%</div>
            <div class="modal__footer">
                <button class="btn btn--danger btn--sm" id="deleteSubjectBtn">删除科目</button>
                <button class="btn btn--primary" id="saveSubjectBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 通用模态框（科目/事件/待办） ==================== -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal">
        <div class="modal__header">
            <h3 class="modal__title" id="modalTitle"></h3>
            <button class="modal__close" id="modalClose">&times;</button>
        </div>
        <form class="modal__body" id="modalForm"></form>
    </div>
</div>

<script src="supabase.min.js"></script>
<script src="auth.js?v=3.2"></script>
<script src="script.js?v=3.3"></script>
<script src="chat.js?v=1.0"></script>

<script>
function showAuthUI(username) {
    const ue = document.getElementById('nav-username'), le = document.getElementById('nav-logout');
    if (ue) { ue.textContent = username; ue.style.display = ''; }
    if (le) { le.style.display = ''; le.addEventListener('click', e => { e.preventDefault(); Auth.logout(); }); }
}
(async () => {
    if (!(await Auth.isLoggedIn())) { window.location.href = '/login.html'; return; }
    let r;
    try { r = await Auth.verify(); } catch (e) {
        showAuthUI(await Auth.getUsername() || '用户'); return;
    }
    if (!r.valid) { window.location.href = '/login.html'; return; }
    showAuthUI(r.username);
})();
</script>
</body>
</html>
