<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskFlow</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.png?v=1">
    <link rel="apple-touch-icon" href="/icon.png?v=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css?v=3.2">
</head>
<body>

<!-- ==================== 顶部导航 ==================== -->
<header class="header">
    <nav class="nav container">
        <a href="#" class="nav__logo" data-tab="todos">📋 TaskFlow</a>
        <div class="nav__tabs">
            <button class="nav__tab active" data-tab="home">🏠 首页</button>
            <button class="nav__tab" data-tab="todos">✅ 待办</button>
            <button class="nav__tab" data-tab="calendar">📅 日历</button>
            <button class="nav__tab" data-tab="subjects">📚 科目</button>
            <button class="nav__tab" data-tab="chat">💬 小马</button>
            <button class="nav__tab" data-tab="calculus">📐 微积分</button>
        </div>
        <ul class="nav__list">
            <li><span class="nav__datetime" id="navDatetime"></span></li>
            <li><button class="btn btn--outline btn--sm" id="importBtn">📤 导入</button></li>
            <li><button class="btn btn--primary btn--sm" id="installBtn" style="display:none;">📲 安装应用</button></li>
            <li class="nav__user">
                <span id="nav-username" class="nav__username" style="display:none;"></span>
                <a href="#" id="nav-logout" class="nav__link nav__link--logout" style="display:none;">退出</a>
                <button class="nav__more-btn" id="navMoreBtn" aria-label="菜单">⋮</button>
                <div class="nav__dropdown" id="navDropdown" style="display:none;">
                    <div class="nav__dropdown-user" id="navDropdownUser"></div>
                    <a href="#" id="navDropdownInstall" style="display:none;">📲 添加到桌面</a>
                    <hr class="nav__dropdown-divider">
                    <a href="#" id="navDropdownLogout">🚪 退出登录</a>
                </div>
            </li>
        </ul>
    </nav>
</header>
<input type="file" id="importFile" accept=".txt,.csv,.md,.docx" style="display:none;">

<!-- ==================== 主内容区 ==================== -->
<main class="main container">

    <!-- ===== 首页视图 ===== -->
    <section class="view active" id="view-home">
        <div class="home-header">
            <h1 class="home-greeting" id="homeGreeting"></h1>
            <p class="home-date" id="homeDate"></p>
        </div>
        <div class="home-countdowns" id="homeCountdowns"></div>
        <div class="home-nav">
            <button class="home-nav-card" data-tab="todos">
                <span class="home-nav-card__icon">✅</span>
                <span class="home-nav-card__label">待办</span>
            </button>
            <button class="home-nav-card" data-tab="calendar">
                <span class="home-nav-card__icon">📅</span>
                <span class="home-nav-card__label">日历</span>
            </button>
            <button class="home-nav-card" data-tab="subjects">
                <span class="home-nav-card__icon">📚</span>
                <span class="home-nav-card__label">科目</span>
            </button>
            <button class="home-nav-card" data-tab="chat">
                <span class="home-nav-card__icon">💬</span>
                <span class="home-nav-card__label">小马</span>
            </button>
            <button class="home-nav-card" data-tab="calculus">
                <span class="home-nav-card__icon">📐</span>
                <span class="home-nav-card__label">微积分</span>
            </button>
        </div>
    </section>

    <!-- ===== 待办视图 ===== -->
    <section class="view" id="view-todos">
        <div class="view__header">
            <div class="view__header-left">
                <button class="btn btn--icon back-btn" data-back="home" title="返回首页">←</button>
                <h2>✅ 待办清单</h2>
                <div class="date-picker">
                    <button class="btn btn--icon" id="todoPrevDay">◀</button>
                    <input type="date" id="todoDate" class="date-input">
                    <button class="btn btn--icon" id="todoNextDay">▶</button>
                    <button class="btn btn--icon" id="todoToday">今天</button>
                </div>
            </div>
            <button class="btn btn--primary btn--sm" id="addTodoBtn">+ 添加任务</button>
        </div>
        <!-- 当天事件提示 -->
        <div class="day-events" id="dayEvents"></div>
        <!-- 任务列表 -->
        <div class="todo-list" id="todoList">
            <p class="empty-text">暂无任务</p>
        </div>
    </section>

    <!-- ===== 日历视图 ===== -->
    <section class="view" id="view-calendar">
        <div class="view__header">
            <button class="btn btn--icon back-btn" data-back="home" title="返回首页">←</button>
            <h2>📅 日历</h2>
            <div class="cal__nav">
                <button class="btn btn--icon" id="calPrev">◀</button>
                <span class="cal__month-label" id="calMonthLabel"></span>
                <button class="btn btn--icon" id="calNext">▶</button>
            </div>
        </div>
        <div class="cal__weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
        <div class="cal__grid" id="calGrid"></div>
        <!-- 点击日期弹窗 -->
        <div class="day-card" id="dayCard" style="display:none;">
            <div class="day-card__header">
                <span class="day-card__date" id="dayCardDate"></span>
                <button class="day-card__close" id="dayCardClose">&times;</button>
            </div>
            <div class="day-card__events" id="dayCardEvents"></div>
            <div class="day-card__actions">
                <button class="btn btn--primary btn--sm" id="dayCardAddEvent">+ 添加事件</button>
                <button class="btn btn--outline btn--sm" id="dayCardAddTodo">+ 添加待办</button>
            </div>
        </div>
    </section>

    <!-- ===== 科目视图 ===== -->
    <section class="view" id="view-subjects">
        <div class="view__header">
            <button class="btn btn--icon back-btn" data-back="home" title="返回首页">←</button>
            <h2>📚 科目管理</h2>
            <button class="btn btn--primary btn--sm" id="addSubjectBtn">+ 添加科目</button>
        </div>
        <div class="subject-grid" id="subjectGrid">
            <p class="empty-text">暂无科目，点击上方按钮添加</p>
        </div>
    </section>

    <!-- ===== 微积分视图 ===== -->
    <section class="view" id="view-calculus">
        <div class="view__header">
            <button class="btn btn--icon back-btn" data-back="home" title="返回首页">←</button>
            <h2>📐 微积分复习</h2>
            <div style="display:flex;gap:8px">
                <a href="https://www.geogebra.org/3d" target="_blank" class="btn btn--outline btn--sm">🌐 GeoGebra 3D</a>
                <button class="btn btn--outline btn--sm" id="calcResetBtn">🔄 重置进度</button>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            <!-- 左侧：复习计划 -->
            <div>
                <h3 style="font-size:1rem;margin-bottom:12px">📅 复习计划</h3>
                <div class="calc-plan" id="calcPlan"></div>
            </div>
            <!-- 右侧：工具 -->
            <div>
                <h3 style="font-size:1rem;margin-bottom:12px">🔧 常用工具</h3>
                <!-- 导数计算器 -->
                <div class="calc-tool-card">
                    <div class="calc-tool-title">📈 导数计算器 <span style="font-weight:400;font-size:.75rem;color:var(--color-text-light)">（支持多项式 如 3x^2+2x+1）</span></div>
                    <div style="display:flex;gap:8px;margin-top:8px">
                        <input class="form-input" id="calcDerivativeInput" placeholder="输入函数，如 3x^2+2x+1" style="flex:1">
                        <button class="btn btn--primary btn--sm" id="calcDerivativeBtn">求导</button>
                    </div>
                    <div id="calcDerivativeResult" style="margin-top:8px;font-size:.9rem;min-height:20px"></div>
                </div>
                <!-- 积分计算器 -->
                <div class="calc-tool-card">
                    <div class="calc-tool-title">📉 不定积分计算器</div>
                    <div style="display:flex;gap:8px;margin-top:8px">
                        <input class="form-input" id="calcIntegralInput" placeholder="输入函数，如 3x^2+2x+1" style="flex:1">
                        <button class="btn btn--primary btn--sm" id="calcIntegralBtn">积分</button>
                    </div>
                    <div id="calcIntegralResult" style="margin-top:8px;font-size:.9rem;min-height:20px"></div>
                </div>
                <!-- 常用公式速查 -->
                <div class="calc-tool-card">
                    <div class="calc-tool-title">📋 常用公式速查</div>
                    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
                        <select class="form-select" id="calcFormulaSelect" style="width:100%">
                            <option value="">-- 选择公式类型 --</option>
                            <option value="derivative">常用导数公式</option>
                            <option value="integral">常用积分公式</option>
                            <option value="trig">三角恒等式</option>
                            <option value="taylor">常用泰勒展开</option>
                        </select>
                        <div id="calcFormulaDisplay" style="font-size:.85rem;line-height:2;background:#f8fafc;border-radius:8px;padding:12px;min-height:40px"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== 问答视图 ===== -->
    <section class="view" id="view-chat">
        <div class="view__header">
            <button class="btn btn--icon back-btn" data-back="home" title="返回首页">←</button>
            <h2>💬 小马</h2>
            <div style="display:flex;gap:6px;align-items:center">
                <div style="display:flex;gap:2px;background:#f1f5f9;border-radius:8px;padding:3px" id="modeGroup">
                    <button class="chat-mode-btn active" data-mode="chat">💬 聊天</button>
                    <button class="chat-mode-btn" data-mode="qa">📚 问答</button>
                    <button class="chat-mode-btn" data-mode="modify">✏️ 修改</button>
                </div>
                <button class="btn btn--outline btn--sm" id="chatClearBtn">🗑️ 清空对话</button>
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." maxlength="500">
                <button class="btn btn--primary" id="chatSendBtn">发送</button>
            </div>
        </div>
    </section>
</main>

<!-- ==================== 科目详情模态框 ==================== -->
<div class="modal-overlay" id="subjectDetailModal" style="display:none;">
    <div class="modal modal--lg">
        <div class="modal__header">
            <h3 class="modal__title" id="subjectDetailTitle"></h3>
            <button class="modal__close" data-close="subjectDetailModal">&times;</button>
        </div>
        <div class="modal__body">
            <div class="form-row">
                <div class="form-group"><label>学分</label><span id="sdCredits"></span></div>
                <div class="form-group"><label>目标绩点</label><span id="sdGPA"></span></div>
            </div>
            <div class="form-group"><label>绩点分配</label></div>
            <div class="component-list" id="componentList"></div>
            <button class="btn btn--outline btn--sm" id="addComponentBtn">+ 添加分配项</button>
            <div class="total-bar" id="totalBar">合计：0%</div>
            <div class="modal__footer">
                <button class="btn btn--danger btn--sm" id="deleteSubjectBtn">删除科目</button>
                <button class="btn btn--primary" id="saveSubjectBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 通用模态框（科目/事件/待办） ==================== -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal">
        <div class="modal__header">
            <h3 class="modal__title" id="modalTitle"></h3>
            <button class="modal__close" id="modalClose">&times;</button>
        </div>
        <form class="modal__body" id="modalForm"></form>
    </div>
</div>

<script src="supabase.min.js"></script>
<script src="auth.js?v=3.2"></script>
<script src="script.js?v=3.3"></script>
<script src="calc.js?v=1.0"></script>
<script src="chat.js?v=1.0"></script>

<script>
function showAuthUI(username) {
    const ue = document.getElementById('nav-username'), le = document.getElementById('nav-logout');
    if (ue) { ue.textContent = username; ue.style.display = ''; }
    if (le) { le.style.display = ''; le.addEventListener('click', e => { e.preventDefault(); Auth.logout(); }); }
    // 下拉菜单（手机端）
    const du = document.getElementById('navDropdownUser'), dl = document.getElementById('navDropdownLogout');
    if (du) { du.textContent = '👤 ' + username; }
    if (dl) { dl.addEventListener('click', e => { e.preventDefault(); Auth.logout(); }); }
}

// 三点菜单开关
document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('navMoreBtn'), dropdown = document.getElementById('navDropdown');
    if (btn && dropdown) {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const show = dropdown.style.display === 'none';
            dropdown.style.display = show ? '' : 'none';
        });
        document.addEventListener('click', () => { dropdown.style.display = 'none'; });
    }
});
(async () => {
    if (!(await Auth.isLoggedIn())) { window.location.href = '/login.html'; return; }
    let r;
    try { r = await Auth.verify(); } catch (e) {
        showAuthUI(await Auth.getUsername() || '用户'); return;
    }
    if (!r.valid) { window.location.href = '/login.html'; return; }
    showAuthUI(r.username);
})();
</script>
<script>
// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}

// 安装按钮（PWA / 手动添加指引）
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
const installDrop = document.getElementById('navDropdownInstall');
const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;

function showInstallBtn(label) {
    if (installBtn) { installBtn.style.display = ''; installBtn.textContent = label; }
    if (installDrop) { installDrop.style.display = ''; installDrop.textContent = label; }
}

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBtn('📲 安装应用');
});

if (isMobile && !deferredPrompt) {
    setTimeout(() => { showInstallBtn('📲 添加到桌面'); }, 1500);
}

async function doInstall() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            if (installBtn) { installBtn.textContent = '✅ 已安装'; installBtn.disabled = true; }
            if (installDrop) { installDrop.textContent = '✅ 已安装'; }
        }
        deferredPrompt = null;
    } else {
        alert(
            '📲 添加到桌面步骤：\n\n' +
            '1. 点浏览器底部「分享」按钮\n' +
            '   （或右上角 ⋮ 菜单）\n' +
            '2. 找到「添加到主屏幕」\n' +
            '3. 点「添加」完成\n\n' +
            '💡 Chrome 浏览器体验更好'
        );
    }
}

installBtn && installBtn.addEventListener('click', doInstall);
installDrop && installDrop.addEventListener('click', (e) => { e.preventDefault(); doInstall(); });

window.addEventListener('appinstalled', () => {
    if (installBtn) { installBtn.textContent = '✅ 已安装'; installBtn.disabled = true; }
    if (installDrop) { installDrop.textContent = '✅ 已安装'; }
});
</script>
</body>
</html>
