<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==================== 导航栏 ==================== -->
    <header class="header">
        <nav class="nav container">
            <a href="#" class="nav__logo">📋 TaskFlow</a>
            <ul class="nav__list">
                <li><span id="nav-username" class="nav__username" style="display:none;"></span></li>
                <li><a href="#" id="nav-logout" class="nav__link nav__link--logout" style="display:none;">退出</a></li>
            </ul>
        </nav>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="main container">
        <!-- ===== 左侧：任务清单 ===== -->
        <section class="panel panel--tasks" id="taskPanel">
            <div class="panel__header">
                <h2 class="panel__title">📋 任务清单</h2>
                <button class="btn btn--primary btn--sm" id="addTaskBtn">+ 添加任务</button>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="todo">待办</button>
                <button class="filter-btn" data-filter="doing">进行中</button>
                <button class="filter-btn" data-filter="done">已完成</button>
            </div>

            <!-- 任务列表 -->
            <div class="task-list" id="taskList">
                <p class="task-list__empty">暂无任务，点击上方按钮添加</p>
            </div>
        </section>

        <!-- ===== 右侧：日历 ===== -->
        <section class="panel panel--calendar" id="calPanel">
            <div class="panel__header">
                <h2 class="panel__title">📅 日历</h2>
                <div class="cal__nav">
                    <button class="btn btn--icon" id="calPrev">◀</button>
                    <span class="cal__month-label" id="calMonthLabel"></span>
                    <button class="btn btn--icon" id="calNext">▶</button>
                </div>
            </div>

            <!-- 日历网格 -->
            <div class="cal__weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="cal__grid" id="calGrid"></div>

            <!-- 选中日期任务 -->
            <div class="cal__day-tasks" id="calDayTasks">
                <p class="task-list__empty cal__day-empty">点击日期查看当天任务</p>
            </div>
        </section>
    </main>

    <!-- ==================== 添加/编辑任务模态框 ==================== -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal__header">
                <h3 class="modal__title" id="modalTitle">添加任务</h3>
                <button class="modal__close" id="modalClose">&times;</button>
            </div>
            <form class="modal__body" id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">任务标题 *</label>
                    <input type="text" id="taskTitle" class="form-input" maxlength="100" required placeholder="输入任务标题">
                </div>
                <div class="form-group">
                    <label for="taskDesc">描述</label>
                    <textarea id="taskDesc" class="form-input" rows="3" maxlength="500" placeholder="输入任务描述（可选）"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">优先级</label>
                        <select id="taskPriority" class="form-input">
                            <option value="高">🔴 高</option>
                            <option value="中" selected>🟡 中</option>
                            <option value="低">🟢 低</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskStatus">状态</label>
                        <select id="taskStatus" class="form-input">
                            <option value="todo">待办</option>
                            <option value="doing">进行中</option>
                            <option value="done">已完成</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskDate">截止日期</label>
                        <input type="date" id="taskDate" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="taskTime">截止时间</label>
                        <input type="time" id="taskTime" class="form-input">
                    </div>
                </div>
                <div class="modal__footer">
                    <button type="button" class="btn btn--outline" id="modalCancel">取消</button>
                    <button type="submit" class="btn btn--primary" id="modalSave">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase + Auth + App -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>

    <!-- ==================== 认证检查 ==================== -->
    <script>
        function showAuthUI(username) {
            const usernameEl = document.getElementById('nav-username');
            const logoutEl = document.getElementById('nav-logout');
            if (usernameEl) {
                usernameEl.textContent = username;
                usernameEl.style.display = '';
            }
            if (logoutEl) {
                logoutEl.style.display = '';
                logoutEl.addEventListener('click', (e) => {
                    e.preventDefault();
                    Auth.logout();
                });
            }
        }

        (async () => {
            if (!(await Auth.isLoggedIn())) {
                window.location.href = '/login.html';
                return;
            }
            let result;
            try {
                result = await Auth.verify();
            } catch (e) {
                console.error('Session 验证失败:', e);
                showAuthUI(await Auth.getUsername() || '用户');
                return;
            }
            if (!result.valid) {
                window.location.href = '/login.html';
                return;
            }
            showAuthUI(result.username);
        })();
    </script>
</body>
</html>
